name: Build Applications

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build Windows
      if: matrix.os == 'windows-latest'
      run: pyinstaller --onefile --noconsole --icon=icon.ico --add-data "icon.ico;." --name KegeAnsw_Windows kege_app.py
      
    - name: Build Mac/Linux
      if: matrix.os != 'windows-latest'
      run: pyinstaller --onefile --noconsole --icon=icon.ico --add-data "icon.ico:." --name KegeAnsw_${{ runner.os }} kege_app.py
      
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KegeAnsw_${{ runner.os }}
        path: dist/*
